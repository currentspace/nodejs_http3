AWSTemplateFormatVersion: '2010-09-09'
Description: Full reference stack for @currentspace/http3 on ECS Fargate with dual TCP/UDP 443 NLB listeners.

Parameters:
  ProjectName:
    Type: String
    Default: http3-node24
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  PublicSubnetACidr:
    Type: String
    Default: 10.42.1.0/24
  PublicSubnetBCidr:
    Type: String
    Default: 10.42.2.0/24
  ContainerImage:
    Type: String
    Description: ECR image URI, e.g. 123456789012.dkr.ecr.us-west-2.amazonaws.com/http3-server:latest
  TlsSecretArn:
    Type: String
    Description: Secrets Manager ARN for HTTP3_TLS_SECRET_JSON payload
  DesiredCount:
    Type: Number
    Default: 2
  AssignPublicIp:
    Type: String
    AllowedValues: [ENABLED, DISABLED]
    Default: ENABLED

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociationA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociationB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for http3 ECS tasks
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}
      RetentionInDays: 14

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub ${ProjectName}-secrets-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref TlsSecretArn

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-nlb
      Type: network
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  UdpTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-udp-443
      Port: 443
      Protocol: UDP
      TargetType: ip
      VpcId: !Ref Vpc
      HealthCheckProtocol: TCP
      HealthCheckPort: '8080'

  TcpTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tcp-443
      Port: 443
      Protocol: TCP
      TargetType: ip
      VpcId: !Ref Vpc
      HealthCheckProtocol: TCP
      HealthCheckPort: '8080'

  ListenerUdp443:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: UDP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref UdpTargetGroup

  ListenerTcp443:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: TCP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TcpTargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ProjectName
      Cpu: '1024'
      Memory: '2048'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: http3-server
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 443
              HostPort: 443
              Protocol: udp
            - ContainerPort: 443
              HostPort: 443
              Protocol: tcp
            - ContainerPort: 8080
              HostPort: 8080
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '443'
            - Name: HEALTH_PORT
              Value: '8080'
            - Name: HTTP3_QUIC_LB
              Value: '0'
          Secrets:
            - Name: HTTP3_TLS_SECRET_JSON
              ValueFrom: !Ref TlsSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command: [CMD-SHELL, curl -sf http://127.0.0.1:8080/readyz || exit 1]
            Interval: 10
            Timeout: 5
            Retries: 3
            StartPeriod: 20
          StopTimeout: 30

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - ListenerUdp443
      - ListenerTcp443
    Properties:
      Cluster: !Ref Cluster
      ServiceName: !Sub ${ProjectName}-service
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB
      TaskDefinition: !Ref TaskDefinition
      LoadBalancers:
        - TargetGroupArn: !Ref UdpTargetGroup
          ContainerName: http3-server
          ContainerPort: 443
        - TargetGroupArn: !Ref TcpTargetGroup
          ContainerName: http3-server
          ContainerPort: 443

Outputs:
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !Ref Service
  NlbDnsName:
    Value: !GetAtt LoadBalancer.DNSName
  UdpTargetGroupArn:
    Value: !Ref UdpTargetGroup
  TcpTargetGroupArn:
    Value: !Ref TcpTargetGroup

