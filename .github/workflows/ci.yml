name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript sources
        run: npm run lint

      - name: Typecheck library and tests
        run: npm run typecheck

      - name: Rust clippy
        run: cargo clippy --all-targets

      - name: Build native + TypeScript
        run: npm run build

      - name: Run full test suite
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run browser interop tests
        run: npm run test:browser:e2e

      - name: Run concurrency performance gate
        env:
          HTTP3_CONCURRENCY_MAX_MS: '12000'
        run: npm run perf:concurrency-gate

      - name: Run load smoke gate
        env:
          HTTP3_LOAD_SMOKE_TOTAL: '150'
          HTTP3_LOAD_SMOKE_CONCURRENCY: '25'
          HTTP3_LOAD_SMOKE_MAX_MS: '10000'
        run: npm run perf:load-smoke-gate

      - name: Smoke install from packed artifact
        run: npm run smoke:install

  docker-runtime-matrix-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup QEMU for arm64 containers
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Linux arm64 Docker runtime matrix
        env:
          DOCKER_RUNTIME_PLATFORM: linux/arm64
        run: npm run test:docker:runtime
