name: Release

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag to publish
        required: true
        default: canary
        type: choice
        options:
          - canary
          - rc
          - latest
      dry_run:
        description: Build prebuilds and dry-run npm publish
        required: true
        default: true
        type: boolean

jobs:
  prebuilds:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-26
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm install -g npm@latest

      - run: npm ci

      - name: Build native prebuild
        run: npx napi build --release --platform --target ${{ matrix.target }}

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  publish:
    needs: prebuilds
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest

      - run: npm ci

      - name: Download prebuild artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          merge-multiple: true

      - name: Verify expected prebuilds
        run: node scripts/verify-prebuilds.mjs

      - name: Publish npm packages dry run
        if: ${{ inputs.dry_run }}
        env:
          HTTP3_DIST_TAG: ${{ inputs.dist_tag }}
          HTTP3_DRY_RUN: "1"
        run: node scripts/publish-npm-release.mjs

      - name: Publish npm packages
        if: ${{ !inputs.dry_run }}
        env:
          HTTP3_DIST_TAG: ${{ inputs.dist_tag }}
        run: node scripts/publish-npm-release.mjs
