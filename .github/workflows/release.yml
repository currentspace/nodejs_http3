name: Release

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag to publish
        required: true
        default: canary
        type: choice
        options:
          - canary
          - rc
          - latest
      dry_run:
        description: Run checks without publishing
        required: true
        default: true
        type: boolean

jobs:
  prebuilds:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Build native prebuild
        run: npx napi build --release --platform --target ${{ matrix.target }}

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error

  publish:
    needs: prebuilds
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Download prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          merge-multiple: true

      - name: Verify expected prebuilds
        run: node scripts/verify-prebuilds.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Release gate checks
        run: npm run release:check

      - name: Smoke install packed artifact
        run: npm run smoke:install

      - name: Publish npm packages dry run
        if: ${{ inputs.dry_run }}
        env:
          HTTP3_DIST_TAG: ${{ inputs.dist_tag }}
          HTTP3_DRY_RUN: '1'
        run: node scripts/publish-npm-release.mjs

      - name: Publish npm packages
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HTTP3_DIST_TAG: ${{ inputs.dist_tag }}
        run: node scripts/publish-npm-release.mjs
