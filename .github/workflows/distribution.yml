name: Distribution

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build release artifact
        run: npm run build

      - name: Run release packaging lane
        run: npm run test:release

      - name: Smoke install packed artifact
        run: npm run smoke:install
