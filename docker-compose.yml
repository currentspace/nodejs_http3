services:
  http3:
    build:
      context: .
      dockerfile: Dockerfile
    image: currentspace/http3-local:dev
    container_name: http3-local
    environment:
      PORT: "443"
      HOST: "0.0.0.0"
      HEALTH_PORT: "8080"
      HEALTH_HOST: "0.0.0.0"
      HTTP3_TLS_CERT_PATH: "/run/certs/server.crt"
      HTTP3_TLS_KEY_PATH: "/run/certs/server.key"
      HTTP3_DISABLE_RETRY: "1"
    ports:
      - target: 443
        published: 8443
        protocol: tcp
      - target: 443
        published: 8443
        protocol: udp
      - target: 8080
        published: 8080
        protocol: tcp
    volumes:
      - ./examples/certs:/run/certs:ro
    restart: unless-stopped
